<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>شاشة المبيعات · EXPO</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Odometer.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.8/themes/odometer-theme-default.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.8/odometer.min.js"></script>
    
    <!-- Canvas-confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <style>
        /* ===== نفس الـ Styles السابق ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --expo-orange: #FF6B1A;
            --expo-orange-light: #FF7F38;
            --expo-orange-dark: #E85A0C;
            --expo-black: #0F0F10;
            --expo-black-soft: #1A1A1C;
            --expo-white: #FFFFFF;
            --expo-gray: #71717A;
            --expo-gold: #CDA434;
        }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Cairo', sans-serif; background: var(--expo-black); color: var(--expo-white); overflow: hidden; }
        .bg-luxury {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
            background: radial-gradient(ellipse at 25% 30%, rgba(255,107,26,0.3) 0%, transparent 60%),
                        radial-gradient(ellipse at 75% 70%, rgba(205,164,52,0.15) 0%, transparent 45%),
                        radial-gradient(ellipse at 50% 50%, #0a0a0c 0%, #050303 100%);
            background-size: 100% 100%;
        }
        .glow-orb {
            position: fixed; width: 80vmin; height: 80vmin; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,107,26,0.15) 0%, rgba(255,107,26,0.05) 40%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none;
            animation: orbPulse 12s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
        }
        .display-container {
            position: relative; z-index: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100vw; height: 100vh;
            padding: 2vh 2vw; text-align: center; overflow: hidden;
        }
        .header-logo { margin-bottom: 1vh; padding: 0 2vw; }
        .header-logo img { height: 8vh; width: auto; max-height: 80px; filter: drop-shadow(0 0 5vh rgba(255,107,26,0.2)); transition: transform 0.3s ease; }
        .header-logo:hover img { transform: scale(1.03); }
        .expo-title {
            font-size: clamp(0.8rem, 2vh, 1.2rem); color: var(--expo-orange);
            letter-spacing: 0.8vw; font-weight: 700; text-transform: uppercase;
            margin-bottom: 1.5vh; opacity: 0.8; text-shadow: 0 0 3vh rgba(255,107,26,0.15);
        }
        .deco-line {
            width: 15vw; max-width: 180px; height: 3px;
            background: linear-gradient(90deg, transparent, var(--expo-orange), var(--expo-gold), var(--expo-orange), transparent);
            margin: 1vh auto 2vh; opacity: 0.7; border-radius: 3px;
        }
        .projects-row {
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap;
            gap: 1.5vh 2vw; margin-bottom: 2vh; padding: 1.5vh 2vw;
            background: rgba(255,107,26,0.06); border-radius: 10vh;
            border: 1px solid rgba(255,107,26,0.1); backdrop-filter: blur(8px); max-width: 96vw;
        }
        .project-item {
            display: flex; flex-direction: column; align-items: center; gap: 0.5vh;
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1); opacity: 0.4;
            cursor: default; padding: 0.5vh 0.2vw; border-radius: 2vh; min-width: 6vw;
        }
        .project-item.active { opacity: 1; transform: scale(1.08); }
        .project-item.pulse { animation: pulseProject 0.9s ease 3; }
        @keyframes pulseProject {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            30% { transform: scale(1.3); opacity: 1; filter: drop-shadow(0 0 5vh rgba(255,107,26,0.7)); }
            70% { transform: scale(1.15); opacity: 1; }
        }
        .project-item .project-icon {
            width: 7vw; height: 7vw; max-width: 90px; max-height: 90px; min-width: 40px; min-height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 3px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
            transition: all 0.4s ease; overflow: hidden; padding: 1.5vh;
        }
        .project-item.active .project-icon { border-color: var(--expo-orange); background: rgba(255,107,26,0.12); box-shadow: 0 0 5vh rgba(255,107,26,0.15); }
        .project-item .project-icon img { width: 100%; height: 100%; object-fit: contain; display: block; filter: brightness(1.3); transition: all 0.4s ease; }
        .project-item.active .project-icon img { filter: brightness(1.5) drop-shadow(0 0 2vh rgba(255,107,26,0.3)); }
        .project-item .project-name {
            font-size: clamp(0.4rem, 1.2vh, 0.8rem); color: rgba(255,255,255,0.3);
            font-weight: 700; letter-spacing: 0.5px; transition: all 0.3s ease; white-space: nowrap;
        }
        .project-item.active .project-name { color: var(--expo-orange); text-shadow: 0 0 2vh rgba(255,107,26,0.3); }
        .counter-section {
            position: relative; background: rgba(0,0,0,0.4); padding: 2vh 4vw; border-radius: 4vh;
            backdrop-filter: blur(6px); border: 1px solid rgba(255,107,26,0.1);
            box-shadow: 0 0 8vh rgba(255,107,26,0.08); overflow: visible !important;
            width: 90vw; max-width: 900px;
        }
        .counter-label {
            font-size: clamp(1rem, 3vh, 2.2rem); font-weight: 700; color: rgba(255,255,255,0.7);
            letter-spacing: 0.4vw; margin-bottom: 1vh; text-shadow: 0 0 3vh rgba(255,107,26,0.1);
        }
        .counter-number {
            font-size: clamp(3rem, 20vh, 240px); font-weight: 900; line-height: 1;
            padding: 1vh 2vw; letter-spacing: 0.4vw;
            filter: drop-shadow(0 0 6vh rgba(255,107,26,0.5)) drop-shadow(0 0 12vh rgba(255,107,26,0.2));
            overflow: visible !important; display: inline-block;
        }
        .counter-number .odometer,
        .counter-number .odometer .odometer-ribbon-inner,
        .counter-number .odometer .odometer-ribbon-inner .odometer-value,
        .counter-number .odometer .odometer-digit .odometer-ribbon-inner .odometer-value {
            font-size: inherit; font-weight: 900; line-height: 1;
            color: #FF6B1A !important;
            background: linear-gradient(135deg, #FF8C42 0%, #FFD700 45%, #FF6B1A 80%, #FFD700 100%) !important;
            -webkit-background-clip: text !important; background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            text-shadow: 0 0 3vh rgba(255,107,26,0.3);
        }
        .counter-number .odometer .odometer-digit { background: transparent !important; }
        .counter-number .odometer .odometer-ribbon { background: transparent !important; }
        .sub-info {
            font-size: clamp(0.6rem, 1.2vh, 1rem); color: rgba(255,255,255,0.08);
            margin-top: 1vh; letter-spacing: 0.6vw; font-weight: 300;
        }
        .flash-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
            pointer-events: none; opacity: 0; transition: opacity 0.1s ease;
        }
        .flash-overlay.active { opacity: 1; animation: flashEffect 0.7s ease forwards; }
        @keyframes flashEffect {
            0% { background: rgba(255,107,26,0.35); }
            100% { background: transparent; opacity: 0; }
        }
        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }
        .bottom-glow {
            position: fixed; bottom: 0; left: 0; right: 0; height: 10vh;
            background: linear-gradient(0deg, rgba(255,107,26,0.08) 0%, transparent 100%);
            z-index: 0; pointer-events: none;
        }
        .fullscreen-btn {
            position: fixed; bottom: 3vh; right: 3vw; z-index: 9999;
            background: rgba(255,107,26,0.15); border: 2px solid rgba(255,107,26,0.3);
            color: var(--expo-white); width: 5vh; height: 5vh; min-width: 36px; min-height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5vh; cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .fullscreen-btn:hover { background: rgba(255,107,26,0.3); border-color: var(--expo-orange); transform: scale(1.1); }
        .fullscreen-btn.exit { background: rgba(255,0,0,0.15); border-color: rgba(255,0,0,0.3); }
        .fullscreen-btn.exit:hover { background: rgba(255,0,0,0.3); border-color: #ff0000; }
        @media (max-aspect-ratio: 4/3) {
            .project-item .project-icon { width: 12vw; height: 12vw; max-width: 70px; max-height: 70px; }
            .counter-number { font-size: clamp(2.5rem, 15vh, 150px); }
            .counter-number .odometer,
            .counter-number .odometer .odometer-ribbon-inner,
            .counter-number .odometer .odometer-ribbon-inner .odometer-value,
            .counter-number .odometer .odometer-digit .odometer-ribbon-inner .odometer-value { font-size: inherit; }
        }
        @media (max-width: 768px) {
            .header-logo img { height: 6vh; }
            .expo-title { font-size: 1.5vh; letter-spacing: 0.5vw; }
            .projects-row { gap: 1vh 1.5vw; padding: 1vh 2vw; border-radius: 6vh; }
            .project-item .project-icon { width: 14vw; height: 14vw; max-width: 60px; max-height: 60px; padding: 1vh; }
            .project-item .project-name { font-size: 0.8vh; }
            .counter-label { font-size: 2vh; }
            .counter-number { font-size: clamp(2rem, 12vh, 100px); }
            .counter-number .odometer,
            .counter-number .odometer .odometer-ribbon-inner,
            .counter-number .odometer .odometer-ribbon-inner .odometer-value,
            .counter-number .odometer .odometer-digit .odometer-ribbon-inner .odometer-value { font-size: inherit; }
            .counter-section { padding: 1.5vh 3vw; }
            .deco-line { width: 20vw; }
        }
        @media (max-width: 480px) {
            .project-item .project-icon { width: 18vw; height: 18vw; max-width: 50px; max-height: 50px; padding: 0.8vh; }
            .counter-number { font-size: clamp(1.5rem, 10vh, 80px); }
            .counter-number .odometer,
            .counter-number .odometer .odometer-ribbon-inner,
            .counter-number .odometer .odometer-ribbon-inner .odometer-value,
            .counter-number .odometer .odometer-digit .odometer-ribbon-inner .odometer-value { font-size: inherit; }
            .counter-label { font-size: 1.6vh; }
            .fullscreen-btn { width: 4vh; height: 4vh; font-size: 2vh; bottom: 2vh; right: 2vw; }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="bg-luxury"></div>
    <div class="glow-orb"></div>
    <div class="bottom-glow"></div>

    <!-- ===== FLASH OVERLAY ===== -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- ===== CONFETTI CANVAS ===== -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="display-container" id="displayContainer">
        <div class="header-logo">
            <img src="Logo-pharaohs.png" alt="Pharaohs Developments" />
        </div>

        <div class="expo-title">معرض الفراعنة العقاري</div>

        <div class="projects-row" id="projectsRow">
            <div class="project-item" data-project="grand-plaza">
                <div class="project-icon"><img src="grand plaza.png" alt="جراند بلازا" /></div>
                <span class="project-name">جراند بلازا</span>
            </div>
            <div class="project-item" data-project="hekaya">
                <div class="project-icon"><img src="HEKAYA.png" alt="حكاية" /></div>
                <span class="project-name">حكاية</span>
            </div>
            <div class="project-item" data-project="celya">
                <div class="project-icon"><img src="CELLIA.png" alt="سيليا" /></div>
                <span class="project-name">سيليا</span>
            </div>
            <div class="project-item" data-project="kyan">
                <div class="project-icon"><img src="KAYAN.png" alt="كيان" /></div>
                <span class="project-name">كيان</span>
            </div>
            <div class="project-item" data-project="taj">
                <div class="project-icon"><img src="TAG.png" alt="تاج" /></div>
                <span class="project-name">تاج</span>
            </div>
            <div class="project-item" data-project="mazar-mall">
                <div class="project-icon"><img src="mazar.png" alt="مزار مول" /></div>
                <span class="project-name">مزار مول</span>
            </div>
            <div class="project-item" data-project="makkah-mall">
                <div class="project-icon"><img src="MAKKAH1.png" alt="مول مكه" /></div>
                <span class="project-name">مول مكه</span>
            </div>
        </div>

        <div class="deco-line"></div>

        <div class="counter-section">
            <div class="counter-label">إجمالي الوحدات المباعة حتى الآن</div>
            <div class="counter-number">
                <span class="odometer" id="totalCounter">0</span>
            </div>
        </div>

        <div class="sub-info">— لحظة نجاح جديدة —</div>
    </div>

    <!-- ===== FULLSCREEN BUTTON ===== -->
    <button class="fullscreen-btn" id="fullscreenBtn" title="تكبير الشاشة">
        <i class="fas fa-expand"></i>
    </button>

    <script>
        // ============================================================
        // 0. FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD3F5eRgetzkp8rzsFrwyDZZJsNuxQxqeE",
            authDomain: "pharaohs-expo-registration.firebaseapp.com",
            projectId: "pharaohs-expo-registration",
            storageBucket: "pharaohs-expo-registration.firebasestorage.app",
            messagingSenderId: "821875473528",
            appId: "1:821875473528:web:1a065f810386f6448ac18d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // 1. DOM REFS
        // ============================================================
        const totalCounter = document.getElementById('totalCounter');
        const flashOverlay = document.getElementById('flashOverlay');
        const projectItems = document.querySelectorAll('.project-item');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // ============================================================
        // 2. ODOMETER INIT
        // ============================================================
        const odometer = new Odometer({
            el: totalCounter,
            value: 0,
            format: 'd',
            duration: 800,
            animation: 'count'
        });

        // ============================================================
        // 3. FULLSCREEN
        // ============================================================
        function toggleFullscreen() {
            const container = document.getElementById('displayContainer');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                else if (container.msRequestFullscreen) container.msRequestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                fullscreenBtn.classList.add('exit');
                fullscreenBtn.title = 'خروج من الشاشة الكاملة';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                fullscreenBtn.classList.remove('exit');
                fullscreenBtn.title = 'تكبير الشاشة';
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);

        function updateFullscreenButton() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                fullscreenBtn.classList.add('exit');
                fullscreenBtn.title = 'خروج من الشاشة الكاملة';
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                fullscreenBtn.classList.remove('exit');
                fullscreenBtn.title = 'تكبير الشاشة';
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
        });

        // ============================================================
        // 4. CONFETTI
        // ============================================================
        function fireConfetti() {
            const colors = ['#FF6B1A', '#FF7F38', '#CDA434', '#FFD700', '#FFFFFF'];
            confetti({ particleCount: 100, spread: 80, origin: { x: 1, y: 0.5 }, colors, startVelocity: 35, gravity: 1.2 });
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 80, origin: { x: 0, y: 0.5 }, colors, startVelocity: 35, gravity: 1.2 });
            }, 120);
            setTimeout(() => {
                confetti({ particleCount: 70, spread: 120, origin: { x: 0.5, y: 0.2 }, colors: ['#FFD700', '#FFFFFF', '#FF6B1A'], startVelocity: 45, gravity: 0.7 });
            }, 250);
            setTimeout(() => {
                confetti({ particleCount: 50, spread: 150, origin: { x: 0.5, y: 0.5 }, colors: ['#FFD700', '#FFFFFF'], startVelocity: 15, gravity: 0.2 });
            }, 400);
        }

        // ============================================================
        // 5. FLASH
        // ============================================================
        function triggerFlash() {
            flashOverlay.classList.remove('active');
            void flashOverlay.offsetWidth;
            flashOverlay.classList.add('active');
            setTimeout(() => { flashOverlay.classList.remove('active'); }, 700);
        }

        // ============================================================
        // 6. PROJECT PULSE
        // ============================================================
        function pulseProject(projectId) {
            projectItems.forEach(item => {
                item.classList.remove('active', 'pulse');
                if (item.dataset.project === projectId) {
                    item.classList.add('active');
                    setTimeout(() => item.classList.add('pulse'), 100);
                    setTimeout(() => item.classList.remove('pulse'), 2800);
                }
            });
        }

        // ============================================================
        // 7. UPDATE COUNTER (مع تحسين الأداء)
        // ============================================================
        let currentTotal = 0;
        let isUpdating = false;

        function updateCounter(newValue, projectId = null) {
            if (isUpdating) return;
            if (newValue === currentTotal) return;

            isUpdating = true;
            currentTotal = newValue;
            odometer.update(newValue);
            triggerFlash();
            fireConfetti();

            if (projectId) {
                pulseProject(projectId);
            } else {
                const randomProject = projectItems[Math.floor(Math.random() * projectItems.length)];
                if (randomProject) pulseProject(randomProject.dataset.project);
            }

            setTimeout(() => {
                isUpdating = false;
            }, 1000);
        }

        // ============================================================
        // 8. FIREBASE LISTENER (مع تحسين الأداء)
        // ============================================================
        db.collection('salesDisplay')
            .doc('salesDisplay')
            .onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const total = data.total || 0;
                    const projectId = data.lastProject || null;
                    if (total !== currentTotal) {
                        updateCounter(total, projectId);
                    }
                } else {
                    db.collection('salesDisplay').doc('salesDisplay').set({
                        total: 0,
                        lastProject: 'mazar-mall',
                        lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
            }, (error) => {
                console.error('❌ خطأ في الاستماع:', error);
            });

        // ============================================================
        // 9. LOAD INITIAL DATA
        // ============================================================
        async function loadInitialData() {
            try {
                const doc = await db.collection('salesDisplay').doc('salesDisplay').get();
                if (doc.exists) {
                    const data = doc.data();
                    const total = data.total || 0;
                    currentTotal = total;
                    odometer.update(total);
                }
            } catch (error) {
                console.error('❌ خطأ في تحميل البيانات الأولية:', error);
            }
        }
        loadInitialData();

        // ============================================================
        // 10. KEYBOARD SHORTCUT (للاختبار)
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                db.collection('salesDisplay').doc('salesDisplay').update({
                    total: firebase.firestore.FieldValue.increment(1),
                    lastProject: 'mazar-mall',
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        });

        console.log('✅ شاشة العرض متجاوبة وجاهزة (مع تحسين الأداء)');
    </script>
</body>
</html>
