<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>شاشة المبيعات · EXPO</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- CountUp.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/2.8.0/countUp.min.js"></script>
    
    <!-- Canvas-confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="icon" type="image/png" href="Asset 5.png">
    
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --expo-orange: #FF6B1A;
            --expo-orange-light: #FF7F38;
            --expo-orange-dark: #E85A0C;
            --expo-black: #0F0F10;
            --expo-black-soft: #1A1A1C;
            --expo-white: #FFFFFF;
            --expo-gray: #71717A;
            --expo-gold: #CDA434;
        }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Cairo', sans-serif; background: var(--expo-black); color: var(--expo-white); overflow: hidden; }
        
        /* ===== BACKGROUND ===== */
        .bg-luxury {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(255, 107, 26, 0.6) 0%, rgba(205, 164, 52, 0.3) 30%, transparent 65%),
                radial-gradient(ellipse at 70% 60%, rgba(255, 107, 26, 0.4) 0%, rgba(205, 164, 52, 0.2) 30%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, #2a150a 0%, #0f0805 100%);
            background-size: 100% 100%;
        }
        
        .glow-orb {
            position: fixed; width: 90vmin; height: 90vmin; border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 26, 0.35) 0%, rgba(255, 107, 26, 0.12) 40%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none;
            animation: orbPulse 15s ease-in-out infinite;
        }
        @keyframes orbPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            50% { transform: translate(-50%, -50%) scale(1.6); opacity: 1; }
        }
        
        .display-container {
            position: relative; z-index: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100vw; height: 100vh;
            padding: 2vh 2vw; text-align: center; overflow: hidden;
        }
        
        /* ===== HEADER LOGOS - أكبر حجم ===== */
        .header-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2vw;
            margin-bottom: 1.5vh;
            padding: 0 2vw;
            flex-wrap: wrap;
        }
        
        .header-logos .logo-item {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* تكبير الشعارات بشكل ملحوظ */
        .header-logos .logo-item img {
            height: 18vh;          /* زيادة من 12vh إلى 18vh */
            width: auto;
            max-height: 200px;     /* زيادة من 130px إلى 200px */
            filter: drop-shadow(0 0 8vh rgba(255, 107, 26, 0.4));
            transition: transform 0.3s ease;
        }
        
        .header-logos .logo-item img:hover {
            transform: scale(1.03);
        }
        
        .header-logos .logo-separator {
            font-size: 8vh;        /* زيادة من 6vh إلى 8vh */
            font-weight: 300;
            color: rgba(255, 255, 255, 0.15);
            padding: 0 0.5vw;
            user-select: none;
        }
        
        /* شعار EXPO أكبر قليلاً من الشعار الرئيسي */
        .header-logos .logo-item.expo img {
            height: 16vh;          /* زيادة من 10vh إلى 16vh */
            max-height: 180px;     /* زيادة من 110px إلى 180px */
        }
        
        .header-logos .logo-item.expo .expo-text {
            font-size: 6vh;        /* زيادة من 5vh إلى 6vh */
            font-weight: 900;
            color: var(--expo-orange);
            text-shadow: 0 0 6vh rgba(255, 107, 26, 0.3);
            letter-spacing: 2px;
        }
        
        /* ===== EXPO TITLE ===== */
        .expo-title {
            font-size: clamp(1.2rem, 3vh, 1.8rem); 
            color: var(--expo-orange);
            letter-spacing: 0.8vw; 
            font-weight: 700; 
            text-transform: uppercase;
            margin-bottom: 1.5vh; 
            opacity: 1; 
            text-shadow: 0 0 3vh rgba(255, 107, 26, 0.3);
        }
        
        .deco-line {
            width: 15vw; max-width: 180px; height: 3px;
            background: linear-gradient(90deg, transparent, var(--expo-orange), var(--expo-gold), var(--expo-orange), transparent);
            margin: 1.5vh auto 2.5vh; opacity: 0.9; border-radius: 3px;
            box-shadow: 0 0 2vh rgba(255, 107, 26, 0.3);
        }
        
        /* ===== PROJECTS ROW ===== */
        .projects-row {
            display: flex; justify-content: center; align-items: center; flex-wrap: wrap;
            gap: 2vh 2.5vw; margin-bottom: 2.5vh; padding: 1.5vh 2.5vw;
            background: rgba(255, 107, 26, 0.12); 
            border-radius: 10vh;
            border: 1px solid rgba(255, 107, 26, 0.25); 
            backdrop-filter: blur(10px); 
            max-width: 96vw;
            min-height: 15vh;
            box-shadow: 0 0 5vh rgba(255, 107, 26, 0.1);
        }
        .project-item {
            display: flex; flex-direction: column; align-items: center; gap: 0.5vh;
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1); 
            opacity: 0.6;
            cursor: default; padding: 0.5vh 0.2vw; border-radius: 2vh; min-width: 6vw;
        }
        .project-item.active { opacity: 1; transform: scale(1.08); }
        .project-item.pulse { animation: pulseProject 0.9s ease 3; }
        .project-item.pulse-all { animation: pulseAll 0.9s ease 3; }
        @keyframes pulseProject {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            30% { transform: scale(1.35); opacity: 1; filter: drop-shadow(0 0 5vh rgba(255, 107, 26, 0.8)); }
            70% { transform: scale(1.15); opacity: 1; }
        }
        @keyframes pulseAll {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            30% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 4vh rgba(255, 107, 26, 0.5)); }
            70% { transform: scale(1.08); opacity: 1; }
        }
        .project-item .project-icon {
            width: 8vw; height: 8vw; max-width: 100px; max-height: 100px; min-width: 50px; min-height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255, 255, 255, 0.15); 
            background: rgba(255, 255, 255, 0.06);
            transition: all 0.4s ease; overflow: hidden; padding: 1.5vh;
            box-shadow: 0 0 3vh rgba(255, 107, 26, 0.05);
        }
        .project-item.active .project-icon { 
            border-color: var(--expo-orange); 
            background: rgba(255, 107, 26, 0.2); 
            box-shadow: 0 0 6vh rgba(255, 107, 26, 0.25); 
        }
        .project-item .project-icon img { 
            width: 100%; height: 100%; object-fit: contain; display: block; 
            filter: brightness(1.4);
            transition: all 0.4s ease; 
        }
        .project-item.active .project-icon img { 
            filter: brightness(1.6) drop-shadow(0 0 2vh rgba(255, 107, 26, 0.4)); 
        }
        .project-item .project-name {
            font-size: clamp(0.5rem, 1.4vh, 0.9rem); 
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700; letter-spacing: 0.5px; transition: all 0.3s ease; white-space: nowrap;
        }
        .project-item.active .project-name { 
            color: var(--expo-orange); 
            text-shadow: 0 0 3vh rgba(255, 107, 26, 0.3); 
        }
        
        /* ===== COUNTER SECTION ===== */
        .counter-section {
            position: relative; 
            background: rgba(0, 0, 0, 0.25); 
            padding: 3vh 5vw; 
            border-radius: 5vh;
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 107, 26, 0.2);
            box-shadow: 0 0 12vh rgba(255, 107, 26, 0.12); 
            overflow: visible !important;
            width: 90vw; max-width: 1000px;
        }
        .counter-label {
            font-size: clamp(1.5rem, 4vh, 2.8rem); 
            font-weight: 700; 
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.4vw; 
            margin-bottom: 1.5vh; 
            text-shadow: 0 0 4vh rgba(255, 107, 26, 0.15);
        }
        .counter-number {
            font-size: clamp(4rem, 25vh, 280px);
            font-weight: 900;
            line-height: 1;
            padding: 1vh 2vw;
            letter-spacing: 0.4vw;
            filter: drop-shadow(0 0 8vh rgba(255, 107, 26, 0.6)) drop-shadow(0 0 16vh rgba(255, 107, 26, 0.3));
            overflow: visible !important;
            display: inline-block;
            background: linear-gradient(135deg, #FF8C42 0%, #FFD700 45%, #FF6B1A 80%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sub-info {
            font-size: clamp(0.8rem, 1.5vh, 1.2rem); 
            color: rgba(255, 255, 255, 0.15);
            margin-top: 1.5vh; 
            letter-spacing: 0.6vw; 
            font-weight: 300;
        }
        
        /* ===== FLASH OVERLAY ===== */
        .flash-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
            pointer-events: none; opacity: 0; transition: opacity 0.1s ease;
        }
        .flash-overlay.active { opacity: 1; animation: flashEffect 0.7s ease forwards; }
        @keyframes flashEffect {
            0% { background: rgba(255, 107, 26, 0.4); }
            100% { background: transparent; opacity: 0; }
        }
        
        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }
        .bottom-glow {
            position: fixed; bottom: 0; left: 0; right: 0; height: 15vh;
            background: linear-gradient(0deg, rgba(255, 107, 26, 0.15) 0%, transparent 100%);
            z-index: 0; pointer-events: none;
        }
        
        /* ===== FULLSCREEN BUTTON ===== */
        .fullscreen-btn {
            position: fixed; bottom: 3vh; right: 3vw; z-index: 9999;
            background: rgba(255, 107, 26, 0.25); 
            border: 2px solid rgba(255, 107, 26, 0.4);
            color: var(--expo-white); 
            width: 6vh; height: 6vh; min-width: 40px; min-height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.8vh; cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .fullscreen-btn:hover { background: rgba(255, 107, 26, 0.4); border-color: var(--expo-orange); transform: scale(1.1); }
        .fullscreen-btn.exit { background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.4); }
        .fullscreen-btn.exit:hover { background: rgba(255,0,0,0.3); border-color: #ff0000; }
        
        /* ===== RESPONSIVE ===== */
        @media (max-aspect-ratio: 4/3) {
            .project-item .project-icon { width: 12vw; height: 12vw; max-width: 80px; max-height: 80px; }
            .counter-number { font-size: clamp(3rem, 18vh, 180px); }
        }
        @media (max-width: 768px) {
            .header-logos .logo-item img { height: 12vh; max-height: 100px; }
            .header-logos .logo-item.expo img { height: 10vh; max-height: 90px; }
            .header-logos .logo-separator { font-size: 5vh; }
            .header-logos { gap: 1.5vw; }
            .expo-title { font-size: 1.8vh; letter-spacing: 0.5vw; }
            .projects-row { gap: 1.2vh 1.8vw; padding: 1.2vh 2vw; border-radius: 6vh; }
            .project-item .project-icon { width: 14vw; height: 14vw; max-width: 70px; max-height: 70px; padding: 1vh; }
            .project-item .project-name { font-size: 1vh; }
            .counter-label { font-size: 2.5vh; }
            .counter-number { font-size: clamp(2.5rem, 14vh, 120px); }
            .counter-section { padding: 2vh 3vw; }
            .deco-line { width: 20vw; }
            .fullscreen-btn { width: 5vh; height: 5vh; font-size: 2.2vh; }
        }
        @media (max-width: 480px) {
            .header-logos .logo-item img { height: 8vh; max-height: 70px; }
            .header-logos .logo-item.expo img { height: 7vh; max-height: 60px; }
            .header-logos .logo-separator { font-size: 3.5vh; }
            .project-item .project-icon { width: 18vw; height: 18vw; max-width: 60px; max-height: 60px; padding: 0.8vh; }
            .counter-number { font-size: clamp(2rem, 12vh, 90px); }
            .counter-label { font-size: 2vh; }
            .fullscreen-btn { width: 4.5vh; height: 4.5vh; font-size: 2vh; bottom: 2vh; right: 2vw; }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="bg-luxury"></div>
    <div class="glow-orb"></div>
    <div class="bottom-glow"></div>

    <!-- ===== FLASH OVERLAY ===== -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <!-- ===== CONFETTI CANVAS ===== -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="display-container" id="displayContainer">
        
        <!-- ===== HEADER: PHARAOHS LOGO | EXPO LOGO (أكبر) ===== -->
        <div class="header-logos">
            <div class="logo-item">
                <img src="Logo-pharaohs.png" alt="Pharaohs Developments" />
            </div>
            <span class="logo-separator">|</span>
            <div class="logo-item expo">
                <img src="EXPO_LOGO.png" alt="EXPO" />
            </div>
        </div>

        <div class="expo-title">#أكبر_حدث_عقاري_بصعيد_مصر</div>

        <!-- Projects Row -->
        <div class="projects-row" id="projectsRow">
            <!-- سيتم تعبئتها ديناميكياً -->
        </div>

        <div class="deco-line"></div>

        <div class="counter-section">
            <div class="counter-label">إجمالي الوحدات المباعة حتى الآن</div>
            <div class="counter-number" id="counterNumber">0</div>
        </div>

        <div class="sub-info">— لحظة نجاح جديدة —</div>
    </div>

    <!-- ===== FULLSCREEN BUTTON ===== -->
    <button class="fullscreen-btn" id="fullscreenBtn" title="تكبير الشاشة">
        <i class="fas fa-expand"></i>
    </button>

    <script>
        // ============================================================
        // 0. FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD3F5eRgetzkp8rzsFrwyDZZJsNuxQxqeE",
            authDomain: "pharaohs-expo-registration.firebaseapp.com",
            projectId: "pharaohs-expo-registration",
            storageBucket: "pharaohs-expo-registration.firebasestorage.app",
            messagingSenderId: "821875473528",
            appId: "1:821875473528:web:1a065f810386f6448ac18d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // 1. DOM REFS
        // ============================================================
        const counterElement = document.getElementById('counterNumber');
        const flashOverlay = document.getElementById('flashOverlay');
        const projectsRow = document.getElementById('projectsRow');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let projectItems = [];
        let currentTotal = 0;
        let isUpdating = false;

        // ============================================================
        // 2. CountUp.js INSTANCE
        // ============================================================
        let countUpInstance = null;

        function initCountUp(value) {
            if (countUpInstance) {
                countUpInstance.update(value);
                return;
            }
            countUpInstance = new CountUp(counterElement, value, {
                duration: 1.5,
                useEasing: true,
                useGrouping: true,
                separator: ',',
                decimal: '.',
                prefix: '',
                suffix: '',
                enableScrollSpy: false
            });
            if (!countUpInstance.error) {
                countUpInstance.start();
            } else {
                counterElement.textContent = value;
            }
        }

        // ============================================================
        // 3. FULLSCREEN
        // ============================================================
        function toggleFullscreen() {
            const container = document.getElementById('displayContainer');
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                else if (container.msRequestFullscreen) container.msRequestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                fullscreenBtn.classList.add('exit');
                fullscreenBtn.title = 'خروج من الشاشة الكاملة';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                fullscreenBtn.classList.remove('exit');
                fullscreenBtn.title = 'تكبير الشاشة';
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);

        function updateFullscreenButton() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                fullscreenBtn.classList.add('exit');
                fullscreenBtn.title = 'خروج من الشاشة الكاملة';
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                fullscreenBtn.classList.remove('exit');
                fullscreenBtn.title = 'تكبير الشاشة';
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
        });

        // ============================================================
        // 4. CONFETTI & FLASH
        // ============================================================
        function fireConfetti() {
            const colors = ['#FF6B1A', '#FF7F38', '#CDA434', '#FFD700', '#FFFFFF'];
            confetti({ particleCount: 100, spread: 80, origin: { x: 1, y: 0.5 }, colors, startVelocity: 35, gravity: 1.2 });
            setTimeout(() => {
                confetti({ particleCount: 100, spread: 80, origin: { x: 0, y: 0.5 }, colors, startVelocity: 35, gravity: 1.2 });
            }, 120);
            setTimeout(() => {
                confetti({ particleCount: 70, spread: 120, origin: { x: 0.5, y: 0.2 }, colors: ['#FFD700', '#FFFFFF', '#FF6B1A'], startVelocity: 45, gravity: 0.7 });
            }, 250);
            setTimeout(() => {
                confetti({ particleCount: 50, spread: 150, origin: { x: 0.5, y: 0.5 }, colors: ['#FFD700', '#FFFFFF'], startVelocity: 15, gravity: 0.2 });
            }, 400);
        }

        function triggerFlash() {
            flashOverlay.classList.remove('active');
            void flashOverlay.offsetWidth;
            flashOverlay.classList.add('active');
            setTimeout(() => { flashOverlay.classList.remove('active'); }, 700);
        }

        // ============================================================
        // 5. PROJECT PULSE
        // ============================================================
        function pulseProject(projectId) {
            projectItems.forEach(item => {
                item.classList.remove('active', 'pulse', 'pulse-all');
            });
            if (projectId) {
                projectItems.forEach(item => {
                    if (item.dataset.project === projectId) {
                        item.classList.add('active');
                        setTimeout(() => item.classList.add('pulse'), 100);
                        setTimeout(() => item.classList.remove('pulse'), 2800);
                    }
                });
            } else {
                projectItems.forEach(item => {
                    item.classList.add('active');
                    setTimeout(() => item.classList.add('pulse-all'), 100);
                    setTimeout(() => item.classList.remove('pulse-all', 'active'), 2800);
                });
            }
        }

        // ============================================================
        // 6. LOAD PROJECTS FROM FIRESTORE
        // ============================================================
        function loadProjects() {
            db.collection('projects')
                .onSnapshot(async (snapshot) => {
                    if (snapshot.empty) {
                        await seedDefaultProjects();
                        loadProjects();
                        return;
                    }
                    projectsRow.innerHTML = '';
                    projectItems = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const projectId = doc.id;
                        const name = data.name || 'مشروع';
                        const logo = data.logo || ''; 

                        const projectItem = document.createElement('div');
                        projectItem.className = 'project-item';
                        projectItem.dataset.project = projectId;
                        projectItem.innerHTML = `
                            <div class="project-icon">
                                ${logo ? `<img src="${logo}" alt="${name}" />` : `<i class="fas fa-building" style="font-size:2rem; color:var(--expo-orange);"></i>`}
                            </div>
                            <span class="project-name">${name}</span>
                        `;
                        projectsRow.appendChild(projectItem);
                        projectItems.push(projectItem);
                    });
                }, (error) => {
                    console.error('❌ خطأ في تحميل المشاريع:', error);
                });
        }

        // ============================================================
        // 7. SEED DEFAULT PROJECTS
        // ============================================================
        async function seedDefaultProjects() {
            const defaultProjects = [
                { id: 'grand-plaza', name: 'جراند بلازا' },
                { id: 'hekaya', name: 'حكاية' },
                { id: 'celya', name: 'سيليا' },
                { id: 'kyan', name: 'كيان' },
                { id: 'taj', name: 'تاج' },
                { id: 'mazar-mall', name: 'مزار مول' },
                { id: 'makkah-mall', name: 'مول مكه' }
            ];
            try {
                const batch = db.batch();
                defaultProjects.forEach(p => {
                    const ref = db.collection('projects').doc(p.id);
                    batch.set(ref, { name: p.name, logo: '' });
                });
                await batch.commit();
                console.log('✅ تمت إضافة المشاريع الافتراضية');
            } catch (error) {
                console.error('❌ خطأ في إضافة المشاريع الافتراضية:', error);
            }
        }

        // ============================================================
        // 8. COUNTER UPDATE
        // ============================================================
        function updateCounter(newValue, projectId = null) {
            if (isUpdating) return;
            if (newValue === currentTotal) return;

            isUpdating = true;
            currentTotal = newValue;

            if (countUpInstance) {
                countUpInstance.update(newValue);
            } else {
                counterElement.textContent = newValue;
            }

            triggerFlash();
            fireConfetti();
            pulseProject(projectId);

            setTimeout(() => {
                isUpdating = false;
            }, 1000);
        }

        // ============================================================
        // 9. FIREBASE LISTENER FOR COUNTER
        // ============================================================
        let lastUpdateTime = 0;

        db.collection('salesDisplay')
            .doc('salesDisplay')
            .onSnapshot((doc) => {
                const now = Date.now();
                if (now - lastUpdateTime < 300) return;
                lastUpdateTime = now;

                if (doc.exists) {
                    const data = doc.data();
                    const total = data.total || 0;
                    const projectId = data.lastProject || null;
                    if (total !== currentTotal) {
                        updateCounter(total, projectId);
                    }
                } else {
                    db.collection('salesDisplay').doc('salesDisplay').set({
                        total: 0,
                        lastProject: null,
                        lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                }
            }, (error) => {
                console.error('❌ خطأ في الاستماع:', error);
            });

        // ============================================================
        // 10. LOAD INITIAL DATA
        // ============================================================
        async function loadInitialData() {
            try {
                const doc = await db.collection('salesDisplay').doc('salesDisplay').get();
                if (doc.exists) {
                    const data = doc.data();
                    const total = data.total || 0;
                    currentTotal = total;
                    initCountUp(total);
                } else {
                    initCountUp(0);
                }
            } catch (error) {
                console.error('❌ خطأ في تحميل البيانات الأولية:', error);
                initCountUp(0);
            }
        }
        loadInitialData();

        // ============================================================
        // 11. START LOADING PROJECTS
        // ============================================================
        loadProjects();

        console.log('✅ شاشة العرض المضيئة جاهزة!');
    </script>
</body>
</html>
